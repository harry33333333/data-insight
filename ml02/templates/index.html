<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data-Insight: 智能数据流水线</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body class="bg-slate-100 font-sans p-6">

<div class="max-w-7xl mx-auto">
    <header class="bg-white rounded-2xl shadow-sm p-6 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">Data-Insight AI Agent</h1>
            <p class="text-gray-500 text-sm mt-1">CrewAI + Qwen3.7 + PostgreSQL 自动化分析系统</p>
        </div>
        <div class="flex gap-4">
            <button onclick="importDB()" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow font-medium transition">
                1. 将 CSV 导入 PostgreSQL
            </button>
            <button onclick="runAI()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow font-medium transition flex items-center">
                2. 运行 AI 多智能体 (TDD 生成)
            </button>
            <button onclick="loadReport()" class="px-5 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg shadow font-medium transition">
                3. 查看数据看板
            </button>
        </div>
    </header>

    <div class="bg-gray-900 rounded-xl p-4 mb-8 shadow-inner text-green-400 font-mono text-sm h-48 overflow-y-auto" id="console">
        系统初始化完毕。等待操作...
    </div>

    <div id="dashboard" class="hidden">
        <div class="grid grid-cols-4 gap-6 mb-6" id="overview-cards"></div>
        
        <div class="grid grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-lg font-bold text-gray-700 mb-4 border-l-4 border-blue-500 pl-3">各产品域 PV 排行</h3>
                <div id="pvChart" style="height: 350px;"></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-lg font-bold text-gray-700 mb-4 border-l-4 border-indigo-500 pl-3">各产品域 用户分层</h3>
                <div id="layerChart" style="height: 350px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function logMessage(msg) {
        const consoleEl = document.getElementById('console');
        consoleEl.innerHTML += `<div>> ${new Date().toLocaleTimeString()}: ${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function importDB() {
        logMessage("正在扫描 data/ 目录并自动建表导入 PostgreSQL... 请稍候。");
        const res = await fetch('/api/import-db', { method: 'POST' });
        const data = await res.json();
        logMessage(data.message);
    }

    async function runAI() {
        logMessage("唤醒 Qwen3.7-plus 智能体团队。正在生成代码、访问数据库并运行 TDD 测试... 这需要几十秒钟。");
        const res = await fetch('/api/run-ai', { method: 'POST' });
        const data = await res.json();
        logMessage(data.status === 'success' ? "✅ " + data.message : "❌ " + data.message);
    }

    async function loadReport() {
        logMessage("正在拉取 report_data.json 渲染大屏...");
        const res = await fetch('/api/report-data');
        const data = await res.json();

        if (data.error) {
            logMessage("❌ " + data.error);
            return;
        }

        document.getElementById('dashboard').classList.remove('hidden');

        // 渲染概览卡片
        const overviewHtml = `
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100"><div class="text-gray-500 text-sm">总计 DAU</div><div class="text-3xl font-black text-gray-800 mt-1">${data.overview.dau}</div></div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100"><div class="text-gray-500 text-sm">总计 UV</div><div class="text-3xl font-black text-gray-800 mt-1">${data.overview.uv}</div></div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100"><div class="text-gray-500 text-sm">总计 PV</div><div class="text-3xl font-black text-gray-800 mt-1">${data.overview.pv}</div></div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100"><div class="text-gray-500 text-sm">平均停留时长</div><div class="text-3xl font-black text-blue-600 mt-1">${data.overview.avg_duration} <span class="text-base font-normal">秒</span></div></div>
        `;
        document.getElementById('overview-cards').innerHTML = overviewHtml;

        // 渲染 PV 排行柱状图
        const pvChart = echarts.init(document.getElementById('pvChart'));
        const pages = data.pv_ranks.map(item => item.page_name.substring(0, 8)); // 截断长名称
        const pvs = data.pv_ranks.map(item => item.pv);
        pvChart.setOption({
            tooltip: {},
            xAxis: { type: 'category', data: pages, axisLabel: { rotate: 30 } },
            yAxis: { type: 'value' },
            series: [{ type: 'bar', data: pvs, itemStyle: { color: '#3b82f6', borderRadius: [4, 4, 0, 0] } }]
        });

        // 渲染用户分层饼图
        const layerChart = echarts.init(document.getElementById('layerChart'));
        const layerData = data.user_layers.map(item => ({ name: `[${item.domain}] ${item.layer}`, value: item.user_count }));
        layerChart.setOption({
            tooltip: { trigger: 'item' },
            series: [{
                type: 'pie', radius: ['40%', '70%'],
                itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                data: layerData
            }]
        });

        logMessage("✅ 数据看板渲染完成！");
    }
</script>
</body>
</html>
